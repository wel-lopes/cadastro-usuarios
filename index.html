<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>

<body>

    <div class="container">

        <h1>Cadastro</h1>

        <form>

            <div class="campo">
                <label for="nome">Nome</label>
                <input 
                    type="text"
                    id="nome"
                    name="nome"
                    placeholder="Digite seu nome"
                    required
                    autocomplete="name"
                >
            </div>

            <div class="campo">
                <label for="email">E-mail</label>
                <input 
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Digite seu e-mail"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input 
                    type="password"
                    id="senha"
                    name="senha"
                    placeholder="Digite sua senha"
                    required
                    minlength="6"
                >
            </div>

            <button type="submit">
                Cadastrar
            </button>

        </form>

    </div>

</body>

</html>
